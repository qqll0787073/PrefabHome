name: PH-010C Linux migration dry run

on:
  push:
    branches:
      - ph010c-logistics-workspace-foundation
    paths:
      - .github/workflows/ph010c-linux-migration-dry-run.yml
      - supabase/migrations/**

permissions:
  contents: read

concurrency:
  group: ph010c-linux-migration-dry-run
  cancel-in-progress: false

jobs:
  verify-staging-migrations:
    if: github.ref_name == 'ph010c-logistics-workspace-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_STAGING_PROJECT_REF: bvzbkjpbnczquecwqvlm
      PRODUCTION_PROJECT_REF: eoyrfrjbjglfudfuwxdf
      PREFAB_STAGING_PROJECT_REF: ${{ secrets.PREFAB_STAGING_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PREFAB_STAGING_DATABASE_PASSWORD }}

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ph010c-logistics-workspace-foundation

      - name: Enforce staging safety boundary
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_NAME" != "ph010c-logistics-workspace-foundation" ]]; then
            echo "Unexpected workflow branch." >&2
            exit 1
          fi

          if [[ -z "${PREFAB_STAGING_PROJECT_REF:-}" || -z "${SUPABASE_ACCESS_TOKEN:-}" || -z "${SUPABASE_DB_PASSWORD:-}" ]]; then
            echo "Required staging Actions secrets are missing." >&2
            exit 1
          fi

          if [[ "$PREFAB_STAGING_PROJECT_REF" == "$PRODUCTION_PROJECT_REF" ]]; then
            echo "Production project ref is denied." >&2
            exit 1
          fi

          if [[ "$PREFAB_STAGING_PROJECT_REF" != "$EXPECTED_STAGING_PROJECT_REF" ]]; then
            echo "Staging project ref does not match the approved target." >&2
            exit 1
          fi

          echo "Staging safety guard passed; production ref denied."

      - name: Install pinned Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Verify isolated migration dry run
        shell: bash
        run: |
          set -euo pipefail

          cli_version="$(supabase --version)"
          if [[ "$cli_version" != "2.109.1" ]]; then
            echo "Unexpected Supabase CLI version." >&2
            exit 1
          fi

          workspace="$(mktemp -d)"
          trap 'rm -rf "$workspace"' EXIT

          supabase init --workdir "$workspace" >/dev/null
          mkdir -p "$workspace/supabase/migrations"
          cp supabase/migrations/[0-9][0-9][0-9][0-9]_*.sql "$workspace/supabase/migrations/"

          mapfile -t local_versions < <(find "$workspace/supabase/migrations" -maxdepth 1 -type f -printf '%f\n' | sed -nE 's/^([0-9]{4})_.+\.sql$/\1/p' | sort)
          mapfile -t expected_local < <(seq 1 24 | xargs -I{} printf '%04d\n' {})
          if ! diff -u <(printf '%s\n' "${expected_local[@]}") <(printf '%s\n' "${local_versions[@]}"); then
            echo "Isolated workspace must contain exactly migrations 0001 through 0024." >&2
            exit 1
          fi

          supabase link --project-ref "$PREFAB_STAGING_PROJECT_REF" --workdir "$workspace" >/dev/null

          sanitize_migration_list() {
            perl -pe 's/\e\[[0-9;?]*[ -\/]*[@-~]//g' "$1"
          }

          before_list_raw="$RUNNER_TEMP/ph010c-migration-list-before-raw.txt"
          before_list="$RUNNER_TEMP/ph010c-migration-list-before.txt"
          supabase migration list --linked --workdir "$workspace" 2>&1 | tee "$before_list_raw"
          sanitize_migration_list "$before_list_raw" > "$before_list"

          mapfile -t remote_before < <(
            awk -F '|' '
              NF >= 2 {
                remote = $2
                gsub(/[`[:space:]]/, "", remote)
                if (remote ~ /^[0-9]{4}$/) print remote
              }
            ' "$before_list" | sort -u
          )
          mapfile -t expected_remote < <(seq 1 23 | xargs -I{} printf '%04d\n' {})
          if [[ ${#remote_before[@]} -eq 0 ]] || ! diff -u <(printf '%s\n' "${expected_remote[@]}") <(printf '%s\n' "${remote_before[@]}"); then
            echo "Sanitized migration list captured before dry run:" >&2
            cat "$before_list" >&2
            echo "Remote migrations are not exactly 0001 through 0023." >&2
            exit 1
          fi

          echo "Sanitized migration list captured before dry run:"
          cat "$before_list"

          set +e
          dry_run_output="$(supabase db push --linked --dry-run --workdir "$workspace" 2>&1)"
          dry_run_status=$?
          set -e
          printf '%s\n' "$dry_run_output"
          if [[ $dry_run_status -ne 0 ]]; then
            echo "Supabase dry run failed." >&2
            exit "$dry_run_status"
          fi

          mapfile -t pending_migrations < <(printf '%s\n' "$dry_run_output" | grep -oE '[0-9]{4}_[[:alnum:]_]+\.sql' | sort -u)
          expected_pending="0024_logistics_arrangement_workspace_foundation.sql"
          if [[ ${#pending_migrations[@]} -ne 1 || "${pending_migrations[0]}" != "$expected_pending" ]]; then
            echo "Dry run did not report exactly migration 0024 as pending." >&2
            exit 1
          fi

          after_list_raw="$RUNNER_TEMP/ph010c-migration-list-after-raw.txt"
          after_list="$RUNNER_TEMP/ph010c-migration-list-after.txt"
          supabase migration list --linked --workdir "$workspace" > "$after_list_raw" 2>&1
          sanitize_migration_list "$after_list_raw" > "$after_list"
          mapfile -t remote_after < <(
            awk -F '|' '
              NF >= 2 {
                remote = $2
                gsub(/[`[:space:]]/, "", remote)
                if (remote ~ /^[0-9]{4}$/) print remote
              }
            ' "$after_list" | sort -u
          )
          if [[ ${#remote_after[@]} -eq 0 ]] || ! diff -u <(printf '%s\n' "${expected_remote[@]}") <(printf '%s\n' "${remote_after[@]}"); then
            echo "Sanitized migration list captured after dry run:" >&2
            cat "$after_list" >&2
            echo "Remote migration history changed during dry run." >&2
            exit 1
          fi

          echo "Sanitized migration list captured after dry run:"
          cat "$after_list"

          summary="$RUNNER_TEMP/ph010c-linux-dry-run-summary.txt"
          {
            echo "execution_environment=ubuntu-latest"
            echo "supabase_cli_version=$cli_version"
            echo "remote_migrations=$(IFS=,; echo "${remote_after[*]}")"
            echo "pending_migrations=${pending_migrations[0]}"
            echo "migration_0024_applied=false"
            echo "production_ref_denied=true"
          } > "$summary"

          cat "$summary" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized dry-run summary
        uses: actions/upload-artifact@v4
        with:
          name: ph010c-linux-dry-run-summary
          path: ${{ runner.temp }}/ph010c-linux-dry-run-summary.txt
          retention-days: 7
          if-no-files-found: error
