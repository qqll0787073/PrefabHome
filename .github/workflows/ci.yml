name: CI Verification

on:
  pull_request:
  push:
    branches:
      - production-sprint-1
      - production-sprint-2
      - production-sprint-2b
      - production-sprint-2c
      - production-sprint-2d

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_ENABLE_MARKETPLACE_DEMO: "false"
      VITE_SUPABASE_URL: https://nonconnecting.example.invalid
      VITE_SUPABASE_ANON_KEY: ci-browser-publishable-placeholder
      VITE_DEPLOYMENT_ENV: ci
      VITE_APP_VERSION: ci
      VITE_COMMIT_SHA: unknown
      VITE_PUBLIC_SITE_URL: https://example.invalid
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic quality gate
        run: npm run verify:quality

      - name: Audit dependencies
        run: npm audit --audit-level=low
